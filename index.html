function drawCampfireShape(c, x, y, size, ts = 0, ui = false) {
  const s = size / 100;
  const flicker = 1 + Math.sin(ts / 90) * 0.06;
  c.save();
  c.translate(x, y);
  c.scale(s, s);
  vStyle(c, (ui ? 2 : 3) / s);
  c.fillStyle = '#90959a';
  [[-18, 10], [0, 16], [18, 10], [-8, 0], [10, -2]].forEach(([cx, cy]) => {
    c.beginPath();
    c.arc(cx, cy, 10, 0, Math.PI * 2);
    c.fill();
    c.stroke();
  });
  c.save();
  c.scale(flicker, flicker);
  c.fillStyle = '#ffb32d';
  vPoly(c, [[0, -26], [10, -4], [22, -10], [12, 8], [18, 24], [0, 14], [-18, 24], [-12, 8], [-22, -10], [-10, -4]]);
  c.fill();
  c.stroke();
  c.fillStyle = '#ff6f2b';
  vPoly(c, [[0, -16], [8, 0], [12, 14], [0, 8], [-12, 14], [-8, 0]]);
  c.fill();
  c.stroke();
  c.restore();
  c.restore();
}

function drawItemGlyph(c, id, x, y, size, ts = 0, ui = false) {
  switch (id) {
    case 'branch':
      drawBranchShape(c, x, y, size, ui);
      break;
    case 'stone':
      drawOreShape(c, x, y, size, '#9ca1a5', ui);
      break;
    case 'fiber':
      drawFiberShape(c, x, y, size, ui);
      break;
    case 'berry':
      drawBerryShape(c, x, y, size, ui);
      break;
    case 'rawMeat':
      drawMeatShape(c, x, y, size, false, ui);
      break;
    case 'cookedMeat':
      drawMeatShape(c, x, y, size, true, ui);
      break;
    case 'bandage':
      drawBandageShape(c, x, y, size, ui);
      break;
    case 'axe':
    case 'pickaxe':
    case 'hammer':
    case 'spear':
      drawToolShape(c, id, x, y, size, ui);
      break;
    case 'campfire':
      drawCampfireShape(c, x, y, size, ts, ui);
      break;
    case 'workbench':
      drawWorkbenchShape(c, x, y, size, ui);
      break;
    case 'floor':
      drawFloorShape(c, x, y, size, ui);
      break;
    case 'woodWall':
      drawWallShape(c, x, y, size, ui);
      break;
    case 'door':
      drawDoorShape(c, x, y, size, false, ui);
      break;
    case 'stoneWall':
      drawStoneWallShape(c, x, y, size, ui);
      break;
    case 'stoneDoor':
      drawStoneDoorShape(c, x, y, size, false, ui);
      break;
    default:
      drawOreShape(c, x, y, size, '#9ca1a5', ui);
      break;
  }
}

function drawResourceGlyph(c, rtype, x, y, size, ts = 0, seed = 0) {
  const windPhase = ts / 1000 + seed;
  if (rtype === 'bush') drawBushShape(c, x, y, size, { windPhase });
  else if (rtype === 'nettle') drawBushShape(c, x, y, size, { nettle: true, windPhase });
  else if (rtype === 'berryBush') drawBushShape(c, x, y, size, { berry: true, windPhase });
  else if (rtype === 'ore') drawOreShape(c, x, y, size, '#90969b', false);
}

function makeItemIconCanvas(id, size = 34, className = 'slotIcon') {
  const icon = document.createElement('canvas');
  icon.width = size;
  icon.height = size;
  icon.className = className;
  const ic = icon.getContext('2d');
  drawItemGlyph(ic, id, size / 2, size / 2, size * 0.82, performance.now(), true);
  return icon;
}

// ─── Build a procedural 256×256 grass tile on an offscreen canvas ────────
function buildGrassOffscreen() {
  const oc = document.createElement('canvas');
  oc.width  = GRASS_TILE;
  oc.height = GRASS_TILE;
  const c   = oc.getContext('2d');

  // 1) Base fill — lighter devast.io-style green
  c.fillStyle = '#528c3a';
  c.fillRect(0, 0, GRASS_TILE, GRASS_TILE);

  // 2) If the grass asset loaded, blend it in as a tint layer
  if (imgOk('grass')) {
    c.globalAlpha = 0.45;
    c.drawImage(imgs.grass, 0, 0, GRASS_TILE, GRASS_TILE);
    c.globalAlpha = 1;
  }

  // 3) Very low-contrast patches — keep opacity tiny to avoid visible tile seams
  for (let i = 0; i < 10; i++) {
    const x  = GRASS_TILE / 2 + (Math.random() - 0.5) * GRASS_TILE * 0.7; // stay away from edges
    const y  = GRASS_TILE / 2 + (Math.random() - 0.5) * GRASS_TILE * 0.7;
    const r  = 30 + Math.random() * 55;
    const gv = Math.floor(100 + Math.random() * 25);
    const grad = c.createRadialGradient(x, y, 0, x, y, r);
    grad.addColorStop(0, `rgba(20,${gv},12,0.07)`);
    grad.addColorStop(1, `rgba(20,${gv},12,0)`);
    c.fillStyle = grad;
    c.beginPath(); c.arc(x, y, r, 0, Math.PI * 2); c.fill();
  }

  // 4) Fine grass-blade strokes — very low contrast so seams are invisible
  for (let i = 0; i < 240; i++) {
    const x  = Math.random() * GRASS_TILE;
    const y  = Math.random() * GRASS_TILE;
    const h  = 2 + Math.random() * 6;
    const gv = Math.floor(88 + Math.random() * 40);
    c.strokeStyle = `rgba(10,${gv},8,0.14)`;
    c.lineWidth   = 0.6;
    c.beginPath();
    c.moveTo(x, y);
    c.lineTo(x + (Math.random() - 0.5) * 3, y - h);
    c.stroke();
  }

  return oc;
}

// ─── Tiled grass background ───────────────────────────────────
function drawBackground() {
  // Build the procedural tile once (lazy)
  if (!grassOffscreen) {
    grassOffscreen = buildGrassOffscreen();
  }
  // (Re)create pattern after canvas resize invalidates it
  if (!grassPattern) {
    grassPattern = ctx.createPattern(grassOffscreen, 'repeat');
  }

  // Scroll the pattern in sync with the camera.
  // translate(-ox,-oy) shifts the canvas so the pattern origin lands at
  // world(0,0), making tiles appear fixed in world space.
  const ox = ((cam.x % GRASS_TILE) + GRASS_TILE) % GRASS_TILE;
  const oy = ((cam.y % GRASS_TILE) + GRASS_TILE) % GRASS_TILE;
  ctx.save();
  ctx.translate(-ox, -oy);
  ctx.fillStyle = grassPattern;
  ctx.fillRect(0, 0, canvas.width + GRASS_TILE, canvas.height + GRASS_TILE);
  ctx.restore();
}

// ─── Resource HP bar (only shown when damaged) ───────────────
function drawHpBar(wx, wy, radius, cur, max) {
  if (cur === max) return;
  const { sx, sy } = toScreen(wx, wy);
  const w = 36, h = 5;
  ctx.fillStyle = 'rgba(0,0,0,.6)';
  ctx.fillRect(sx - w/2 - 1, sy - radius - 13, w + 2, h + 2);
  ctx.fillStyle = '#922';
  ctx.fillRect(sx - w/2, sy - radius - 12, w, h);
  ctx.fillStyle = '#2e2';
  ctx.fillRect(sx - w/2, sy - radius - 12, w * cur / max, h);
}

// ─── Ground shadow: dark soft ellipse drawn under each sprite ──
function drawShadow(wx, wy, size) {
  const { sx, sy } = toScreen(wx, wy);
  if (sx < -size * 2 || sx > canvas.width + size * 2) return;
  ctx.save();
  ctx.globalAlpha = 0.18;
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.ellipse(sx, sy + size * 0.39, size * 0.5, size * 0.15, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 0.28;
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.ellipse(sx, sy + size * 0.37, size * 0.3, size * 0.08, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

// ─── Yellow highlight ring when a resource is within reach ───
function drawNearHighlight(wx, wy, radius) {
  const d = Math.hypot(wx - player.x, wy - player.y);
  if (d > REACH + radius + 12) return;
  const { sx, sy } = toScreen(wx, wy);
  const t = Math.max(0, 1 - d / (REACH + radius + 12));
  ctx.save();
  ctx.globalAlpha = t * 0.6;
  ctx.strokeStyle = '#ffe866';
  ctx.lineWidth   = 2.5;
  ctx.beginPath();
  ctx.arc(sx, sy, radius + 6, 0, Math.PI * 2);
  ctx.stroke();
  ctx.restore();
}

// ─── Player sprite + tool in hand ───────────────────────────
function drawPlayer() {
  const { sx, sy } = toScreen(player.x, player.y);
  const now = Date.now();
  const breatheX = player.isMoving ? 1 : (1 + Math.sin(now / 1000) * 0.02);
  const breatheY = player.isMoving ? 1 : (1 - Math.sin(now / 1000) * 0.01);
  const swingPhase = player.atkAnim > 0 ? 1 - player.atkAnim / ATTACK_SWING_DUR : 0;
  const swingArc = player.atkAnim > 0 ? Math.sin(swingPhase * Math.PI) : 0;
  const chewArc = player.useProgress > 0 ? Math.sin(player.useProgress * Math.PI * 4) * 0.045 : 0;

  ctx.save();
  ctx.translate(sx, sy);
  ctx.rotate(player.angle + player.wobble);
  ctx.scale(breatheX + chewArc, Math.max(0.9, breatheY - chewArc * 0.6));

  const R  = 20;   // body radius
  const AR = 7;    // arm radius
  const sw = swingArc * 0.55;
  const heldId = activeTool();
  const heldDef = heldId ? ITEMS[heldId] : null;
  const isHeldTool = heldId && (heldId === 'axe' || heldId === 'pickaxe' || heldId === 'hammer' || heldId === 'spear');
  const handLift = player.useProgress > 0 ? Math.sin(player.useProgress * Math.PI) : 0;
  const handBob = Math.sin(now / 140) * 1.3;
  const actionArmX = -5 + sw * 22 + (!isHeldTool && heldDef && !heldDef.placeable ? handLift * 16 : 0);
  const actionArmY = R + AR + 2 - (!isHeldTool && heldDef && !heldDef.placeable ? handLift * 18 : 0);

  // ── Arms (drawn first so body overlaps) ──────────────────────
  ctx.strokeStyle = '#000';
  ctx.lineWidth   = 3;
  ctx.fillStyle   = '#FFCC00';

  ctx.beginPath(); // passive arm (left side relative to movement)
  ctx.arc(-5, -(R + AR + 2), AR, 0, Math.PI * 2);
  ctx.fill(); ctx.stroke();

  ctx.beginPath(); // weapon arm — swings forward (+X) on attack
  ctx.arc(actionArmX, actionArmY, AR, 0, Math.PI * 2);
  ctx.fill(); ctx.stroke();

  // ── Body ─────────────────────────────────────────────────────
  ctx.fillStyle   = '#FFCC00';
  ctx.strokeStyle = '#000';
  ctx.lineWidth   = 4;
  ctx.beginPath();
  ctx.arc(0, 0, R, 0, Math.PI * 2);
  ctx.fill(); ctx.stroke();

  // ── Eyes (two black dots facing +X direction) ─────────────────
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath(); ctx.arc(13, -7, 3.5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(13,  7, 3.5, 0, Math.PI * 2); ctx.fill();

  if (heldId && heldDef && !heldDef.placeable && !isHeldTool) {
    ctx.save();
    ctx.translate(26 - handLift * 10, 10 - handLift * 20 + handBob);
    ctx.rotate(-0.25 - handLift * 0.9 + Math.sin(now / 120) * 0.04);
    drawItemGlyph(ctx, heldId, 0, 0, heldDef.eat || heldDef.use ? 24 : 20, now, false);
    ctx.restore();
  }

  ctx.restore();

  // ── Tool / weapon in hand (animated swing) ─────────────────
  const tool = heldId;
  if (tool && (tool === 'axe' || tool === 'pickaxe' || tool === 'hammer' || tool === 'spear')) {
    const hAngle = player.angle + player.wobble + swingArc * (Math.PI / 4);
    const hx = sx + Math.cos(hAngle) * 42;
    const hy = sy + Math.sin(hAngle) * 42;
    drawToolShape(ctx, tool, hx, hy, 42, false, hAngle + Math.PI / 3);
  }

  if (player.foodThoughtTimer > 0 && imgOk('foodThought')) {
    const a = player.foodThoughtTimer > 2.35 ? 1 - (player.foodThoughtTimer - 2.35) / 0.35 : player.foodThoughtTimer < 0.25 ? player.foodThoughtTimer / 0.25 : 1;
    const bx = sx + 20;
    const by = sy - 84;
    ctx.save();
    ctx.globalAlpha = clamp(a, 0, 1);
    ctx.fillStyle = 'rgba(255,255,255,0.98)';
    ctx.strokeStyle = '#1e1e1e';
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.arc(sx + 8, sy - 26, 6, 0, Math.PI * 2);
    ctx.arc(sx + 18, sy - 40, 9, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    ctx.beginPath();
    ctx.roundRect(bx - 52, by - 30, 104, 62, 28);
    ctx.fill();
    ctx.stroke();
    ctx.drawImage(imgs.foodThought, bx - 34, by - 22, 68, 44);
    ctx.restore();
  }
}

function drawPlacedObject(obj, ts) {
  ensurePlacedObjectState(obj);
  const item = ITEMS[obj.id];
  if (!item) return;
  const tileSized = obj.id === 'floor' || obj.id === 'woodWall' || obj.id === 'door' || obj.id === 'stoneWall' || obj.id === 'stoneDoor';
  const solidTile = obj.id === 'woodWall' || obj.id === 'door' || obj.id === 'stoneWall' || obj.id === 'stoneDoor';
  const size = tileSized ? 100 : obj.id === 'campfire' ? 52 : obj.id === 'workbench' ? 58 : 48;
  const shadowSize = solidTile ? 52 : size;
  const seed = obj.animSeed || 0;
  const bob = obj.id === 'campfire'
    ? 1 + Math.sin(ts / 120 + seed) * 0.03 + Math.cos(ts / 80 + seed) * 0.02
    : 1;
  if (obj.id !== 'floor') drawShadow(obj.x, obj.y, shadowSize * (obj.id === 'campfire' ? 1.08 : 1));
  if (obj.id === 'campfire') {
    const { sx, sy } = toScreen(obj.x, obj.y);
    ctx.save();
    ctx.globalAlpha = 0.22;
    const glow = ctx.createRadialGradient(sx, sy + 10, 4, sx, sy + 10, 36);
    glow.addColorStop(0, 'rgba(255,210,88,0.9)');
    glow.addColorStop(0.45, 'rgba(255,128,44,0.35)');
    glow.addColorStop(1, 'rgba(255,128,44,0)');
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(sx, sy + 10, 36, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
  const { sx, sy } = toScreen(obj.x, obj.y);
  ctx.save();
  if (bob !== 1) ctx.scale(1, 1);
  if (obj.id === 'door') drawDoorShape(ctx, sx, sy, size * bob, !!obj.open, false);
  else if (obj.id === 'stoneDoor') drawStoneDoorShape(ctx, sx, sy, size * bob, !!obj.open, false);
  else drawItemGlyph(ctx, obj.id, sx, sy, size * bob, ts, false);
  ctx.restore();
  if (obj.id === 'workbench') {
    const jobs = getWorkbenchJobs(obj);
    if (jobs.length) {
      const now = performance.now();
      const readyCount = jobs.filter(job => job.readyAt <= now).length;
      const activeJobs = jobs.filter(job => job.readyAt > now).sort((a, b) => a.readyAt - b.readyAt);
      const statusText = readyCount > 0 ? `ГОТОВО ${readyCount}` : `${Math.max(1, Math.ceil((activeJobs[0].readyAt - now) / 1000))}с`;
      const extraText = `${jobs.length}/4`;
      const { sx: tx, sy: ty } = toScreen(obj.x, obj.y - 46);
      ctx.save();
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.font = 'bold 13px Segoe UI, Arial';
      ctx.fillStyle = 'rgba(0,0,0,0.74)';
      ctx.beginPath();
      ctx.roundRect(tx - 44, ty - 24, 88, 34, 10);
      ctx.fill();
      ctx.fillStyle = readyCount > 0 ? '#b5ff8b' : '#ffe280';
      ctx.fillText(statusText, tx, ty - 5);
      ctx.font = '11px Segoe UI, Arial';
      ctx.fillStyle = 'rgba(255,255,255,0.78)';
      ctx.fillText(extraText, tx, ty + 10);
      ctx.restore();
    }
  }
  if (obj.curHp < obj.maxHp || performance.now() - obj.lastHitAt < 1400) {
    drawHpBar(obj.x, obj.y, Math.max(18, size * 0.36), obj.curHp, obj.maxHp);
  }
}

// ─── Screen-edge vignette for atmosphere ────────────────────
function buildVignetteOffscreen() {
  const oc = document.createElement('canvas');
  oc.width  = canvas.width;
  oc.height = canvas.height;
  const c   = oc.getContext('2d');
  const cx  = canvas.width  / 2;
  const cy  = canvas.height / 2;
  const r   = Math.hypot(cx, cy) * 1.15;
  const g   = c.createRadialGradient(cx, cy, r * 0.45, cx, cy, r);
  g.addColorStop(0, 'rgba(0,0,0,0)');
  g.addColorStop(1, 'rgba(0,0,0,0.42)');
  c.fillStyle = g;
  c.fillRect(0, 0, canvas.width, canvas.height);
  return oc;
}
function drawVignette() {
  if (!vignetteOffscreen) vignetteOffscreen = buildVignetteOffscreen();
  ctx.drawImage(vignetteOffscreen, 0, 0);
}

// ─── Draw world-space popups ─────────────────────────────────
function drawPopups() {
  ctx.textAlign  = 'center';
  ctx.textBaseline = 'bottom';
  ctx.font = 'bold 13px Segoe UI, Arial';
  popups.forEach(p => {
    const { sx, sy } = toScreen(p.wx, p.wy);
    const a = clamp(p.life, 0, 1);
    ctx.globalAlpha = a;
    ctx.strokeStyle = 'rgba(0,0,0,.8)'; ctx.lineWidth = 3;
    ctx.strokeText(p.text, sx, sy);
    ctx.fillStyle = '#ffd875';
    ctx.fillText(p.text, sx, sy);
  });
  ctx.globalAlpha  = 1;
  ctx.textBaseline = 'alphabetic';
}

function drawInteractionPrompt() {
  const prompt = getInteractionPromptTarget();
  if (!prompt) return;
  const offsetY = prompt.kind === 'workbench' ? 30 : 34;
  const { sx, sy } = toScreen(prompt.obj.x, prompt.obj.y - offsetY);
  ctx.save();
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = 'bold 14px Segoe UI, Arial';
  ctx.fillStyle = 'rgba(0,0,0,0.72)';
  ctx.beginPath();
  ctx.roundRect(sx - 52, sy - 14, 104, 28, 8);
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.18)';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.fillStyle = '#ffe280';
  ctx.fillText(prompt.text, sx, sy + 1);
  ctx.restore();
}

function drawMinimap() {
  if (!minimapCtx) return;
  const w = minimapCanvas.width;
  const h = minimapCanvas.height;
  minimapCtx.clearRect(0, 0, w, h);
  minimapCtx.fillStyle = '#07180a';
  minimapCtx.fillRect(0, 0, w, h);
  minimapCtx.strokeStyle = 'rgba(255,255,255,0.12)';
  minimapCtx.lineWidth = 1;
  const grid = 5;
  for (let i = 1; i < grid; i++) {
    const x = i * w / grid;
    minimapCtx.beginPath();
    minimapCtx.moveTo(x, 0);
    minimapCtx.lineTo(x, h);
    minimapCtx.stroke();
  }
  for (let i = 1; i < grid; i++) {
    const y = i * h / grid;
    minimapCtx.beginPath();
    minimapCtx.moveTo(0, y);
    minimapCtx.lineTo(w, y);
    minimapCtx.stroke();
  }
  const px = clamp(player.x / WORLD_WIDTH * w, 5, w - 5);
  const py = clamp(player.y / WORLD_HEIGHT * h, 5, h - 5);
  minimapCtx.fillStyle = '#FDE57A';
  minimapCtx.beginPath();
  minimapCtx.arc(px, py, 4, 0, Math.PI * 2);
  minimapCtx.fill();
}

function drawLargeMapCanvas() {
  if (!largeMapCtx) return;
  const w = largeMapCanvas.width;
  const h = largeMapCanvas.height;
  largeMapCtx.clearRect(0, 0, w, h);
  largeMapCtx.fillStyle = '#04130a';
  largeMapCtx.fillRect(0, 0, w, h);
  largeMapCtx.strokeStyle = 'rgba(255,255,255,0.14)';
  largeMapCtx.lineWidth = 1;
  const cols = 10;
  const rows = 10;
  for (let i = 1; i < cols; i++) {
    const x = i * w / cols;
    largeMapCtx.beginPath();
    largeMapCtx.moveTo(x, 0);
    largeMapCtx.lineTo(x, h);
    largeMapCtx.stroke();
  }
  for (let j = 1; j < rows; j++) {
    const y = j * h / rows;
    largeMapCtx.beginPath();
    largeMapCtx.moveTo(0, y);
    largeMapCtx.lineTo(w, y);
    largeMapCtx.stroke();
  }
  largeMapCtx.fillStyle = 'rgba(255,255,255,0.8)';
  largeMapCtx.font = '12px Segoe UI, Arial';
  const letters = Array.from({ length: cols }, (_, idx) => String.fromCharCode(65 + idx));
  const colStep = w / cols;
  const rowStep = h / rows;
  largeMapCtx.textAlign = 'left';
  largeMapCtx.textBaseline = 'top';
  largeMapCtx.fillStyle = 'rgba(255,255,255,0.52)';
  for (let row = 0; row < rows; row++) {
    for (let col = 0; col < cols; col++) {
      largeMapCtx.fillText(`${letters[col]}${row + 1}`, col * colStep + 6, row * rowStep + 5);
    }
  }
  const px = clamp(player.x / WORLD_WIDTH * w, 8, w - 8);
  const py = clamp(player.y / WORLD_HEIGHT * h, 8, h - 8);
  largeMapCtx.fillStyle = '#FBD75C';
  largeMapCtx.beginPath();
  largeMapCtx.arc(px, py, 7, 0, Math.PI * 2);
  largeMapCtx.fill();
  largeMapCtx.strokeStyle = 'rgba(255,255,255,0.35)';
  largeMapCtx.lineWidth = 2;
  largeMapCtx.beginPath();
  largeMapCtx.arc(px, py, 12, 0, Math.PI * 2);
  largeMapCtx.stroke();
}

function setLargeMapOpen(force) {
  const next = typeof force === 'boolean' ? force : !largeMapOpen;
  largeMapOpen = next;
  if (largeMapModal) largeMapModal.classList.toggle('open', largeMapOpen);
}

// ─── World border ─────────────────────────────────────────────
function drawBorder() {
  ctx.strokeStyle = 'rgba(220,60,60,.7)';
  ctx.lineWidth   = 4;
  ctx.strokeRect(-cam.x, -cam.y, WORLD_WIDTH, WORLD_HEIGHT);
}

// ─── Placement ghost: shows where item will be placed ─────────
function drawPlacementGhost() {
  const tool = activeTool();
  if (!tool || !ITEMS[tool]?.placeable) return;
  const { x, y } = getPlacementPoint();
  const { sx, sy } = toScreen(x, y);
  const boxSize = tool === 'workbench' ? 58 : GRID_SIZE;
  const renderSize = tool === 'workbench' ? 58 : tool === 'floor' || tool === 'woodWall' || tool === 'door' || tool === 'stoneWall' || tool === 'stoneDoor' ? 100 : 50;
  const inRange = isPlacementInRange(x, y);
  ctx.save();
  ctx.globalAlpha = inRange ? 0.45 : 0.2;
  drawItemGlyph(ctx, tool, sx, sy, renderSize, performance.now(), false);
  ctx.strokeStyle = inRange ? '#fff' : '#ff6767';
  ctx.lineWidth = 1.5;
  ctx.strokeRect(sx - boxSize / 2, sy - boxSize / 2, boxSize, boxSize);
  ctx.restore();
}

// ═══════════════════════════════════════════════════════════
//  RENDER LOOP
// ═══════════════════════════════════════════════════════════
function render(ts) {
  const dt = Math.min((ts - lastTs) / 1000, 0.1);
  lastTs = ts;
  update(dt);

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Pixel-crisp sprite scaling
  ctx.imageSmoothingEnabled = false;

  // Background
  drawBackground();
  drawBorder();

  // Build Y-sorted draw list: placed + resources + player, sorted by bottom-Y
  const drawList = [];

  placed.forEach(obj => {
    drawList.push({ y: obj.id === 'floor' ? obj.y - 1000 : obj.y + 24, fn() {
      drawPlacedObject(obj, ts);
    }});
  });

  resources.forEach(res => {
    const sortY = res.y + res.drawSize * 0.45;
    drawList.push({ y: sortY, fn() {
      const rx = res.x + (res.hitJoltX || 0);
      const ry = res.y + (res.hitJoltY || 0);
      const spawnT = res.spawnAnim > 0 ? (1 - res.spawnAnim / RESOURCE_SPAWN_ANIM_DUR) : 1;
      const drawSize = res.drawSize * res.hitScale * (res.spawnAnim > 0 ? (0.45 + spawnT * 0.55) : 1);
      ctx.save();
      ctx.globalAlpha = res.spawnAnim > 0 ? (0.3 + spawnT * 0.7) : 1;
      drawShadow(rx, ry, drawSize);
      drawNearHighlight(rx, ry, drawSize / 2);
      drawResourceGlyph(ctx, res.rtype, rx - cam.x, ry - cam.y, drawSize, ts, res.animSeed || 0);
      ctx.restore();
      if (res.spawnAnim <= 0) drawHpBar(rx, ry, drawSize / 2, res.curHp, res.maxHp);
    }});
  });

  drawList.push({ y: player.y + 22, fn() {
    drawShadow(player.x, player.y, 62);
    drawPlayer();
  }});

  drawList.sort((a, b) => a.y - b.y);
  drawList.forEach(d => d.fn());

  // Particles
  particles.forEach(p => {
    const { sx, sy } = toScreen(p.x, p.y);
    ctx.save();
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.fillStyle   = p.color;
    if (p.circle) {
      ctx.beginPath();
      ctx.arc(sx, sy, p.size / 2, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.fillRect(sx - p.size / 2, sy - p.size / 2, p.size, p.size);
    }
    ctx.restore();
  });

  // Placement ghost
  drawPlacementGhost();

  // Screen-edge vignette (drawn last, over everything)
  drawVignette();

  // Floating text
  drawPopups();
  drawInteractionPrompt();

  // Mini / large map UI
  drawMinimap();
  drawLargeMapCanvas();

  requestAnimationFrame(render);
}

// ═══════════════════════════════════════════════════════════
//  HUD REFRESH
// ═══════════════════════════════════════════════════════════
function refreshHudBars() {
  document.getElementById('hpFill').style.width     = (player.hp     / player.maxHp     * 100) + '%';
  document.getElementById('hungerFill').style.width = (player.hunger / player.maxHunger * 100) + '%';
  document.getElementById('energyFill').style.width = (player.energy / player.maxEnergy * 100) + '%';
}

// ─── Hotbar UI ───────────────────────────────────────────────
function refreshHotbarUI() {
  document.querySelectorAll('.hotslot').forEach((el, i) => {
    // keep the slot-number span
    const numSpan = el.querySelector('.num');
    el.innerHTML = '';
    if (numSpan) el.appendChild(numSpan);

    el.classList.toggle('active', i === activeSlot);

    const slot = hotbar[i];
    if (!slot) return;
    const def = ITEMS[slot.id];
    if (!def) return;

    el.title = `${def.name} ×${slot.qty}`;
    const useFill = document.createElement('div');
    useFill.className = 'useFill';
    el.appendChild(useFill);
    const useRing = document.createElement('div');
    useRing.className = 'useRing';
    el.appendChild(useRing);
    el.appendChild(makeItemIconCanvas(slot.id, 34, 'slotIcon'));

    const q = document.createElement('span');
    q.className = 'qty'; q.textContent = `x${slot.qty}`;
    el.appendChild(q);
  });
  refreshUseProgressUI();
  if (craftOpen) refreshCraftButtons();
}

function refreshUseProgressUI() {
  const slotEl = document.querySelector(`.hotslot[data-slot="${activeSlot}"]`);
  document.querySelectorAll('.hotslot .useFill').forEach(el => {
    el.style.transform = 'scaleY(0)';
  });
  document.querySelectorAll('.hotslot .useRing').forEach(el => {
    el.style.opacity = '0';
  });
  const slot = activeSlotItem();
  if (!slotEl || !slot || !isHoldUseItem(slot.id)) return;
  const fill = slotEl.querySelector('.useFill');
  const ring = slotEl.querySelector('.useRing');
  if (fill) fill.style.transform = `scaleY(${player.useProgress})`;
  if (ring) ring.style.opacity = player.useProgress > 0 ? '1' : '0';
}

// ─── Inventory panel UI ──────────────────────────────────────
function refreshInvUI() {
  refreshHotbarUI();
}

function refreshResourceBar() {
  if (craftOpen) refreshCraftButtons();
}

// ─── Craft menu ──────────────────────────────────────────────
function buildCraftUI() {
  const list = document.getElementById('craftList');
  const titleEl = document.querySelector('#craftTitle h2');
  const subtitleEl = document.querySelector('#craftTitle p');
  list.innerHTML = '';
  const recipes = RECIPES.filter(recipe => (recipe.station || 'hand') === craftContext);
  const stationJobs = craftContext === 'workbench' && craftStation ? getWorkbenchJobs(craftStation) : [];
  const readyCount = craftContext === 'workbench' && craftStation ? getWorkbenchReadyJobs(craftStation).length : 0;
  if (titleEl) titleEl.textContent = craftContext === 'workbench' ? 'Верстак' : 'Craft Box';
  if (subtitleEl) {
    subtitleEl.textContent = craftContext === 'workbench'
      ? `Будівництво і важкий крафт. У черзі: ${stationJobs.length}/4 • Готово: ${readyCount}`
      : 'Базові рецепти в руках';
  }
  recipes.forEach(recipe => {
    const def = ITEMS[recipe.id];
    const idx = RECIPES.indexOf(recipe);
    const el  = document.createElement('div');
    el.className = 'craftItem';

    // icon
    el.appendChild(makeItemIconCanvas(recipe.id, 42, 'craftIcon'));

    // info
    const info = document.createElement('div');
    info.className = 'ci-info';
    const reqText = Object.entries(recipe.needs)
      .map(([k, v]) => `${ITEMS[k]?.name || k} ×${v}`)
      .join(', ');
    const timeText = recipe.time ? ` • ${Math.round(recipe.time / 1000)}с` : '';
    info.innerHTML = `<div class="ci-name">${def.name}${recipe.qty > 1 ? ' ×' + recipe.qty : ''}</div>
                      <div class="ci-req">${reqText}${timeText}</div>`;
    el.appendChild(info);

    // button
    const btn = document.createElement('button');
    btn.className    = 'craftBtn';
    btn.dataset.idx  = idx;
    btn.textContent  = craftContext === 'workbench' ? 'Запустити' : 'Скрафтити';
    btn.addEventListener('click', () => {
      const needsOk = Object.entries(recipe.needs).every(([k, v]) => invCount(k) >= v);
      const queueOk = craftContext !== 'workbench' || !craftStation ? false : getWorkbenchJobs(craftStation).length < 4;
      const canCraft = craftContext === 'workbench'
        ? needsOk && !!craftStation && queueOk
        : needsOk && canAddItem(recipe.id, recipe.qty);
      if (!canCraft) return;
      Object.entries(recipe.needs).forEach(([k, v]) => invRemove(k, v));
      if (craftContext === 'workbench') {
        workbenchJobs.push({
          id: recipe.id,
          qty: recipe.qty,
          readyAt: performance.now() + (recipe.time || 0),
          stationUid: craftStation.uid,
          wx: craftStation?.x || player.x,
          wy: craftStation?.y || player.y,
          readyNotified: false,
        });
        spawnPopup(craftStation?.x || player.x, (craftStation?.y || player.y) - 24, `⚒ ${def.name}`);
        buildCraftUI();
      } else if (invAdd(recipe.id, recipe.qty)) {
        spawnPopup(player.x, player.y - 30, `✔ ${def.name}`);
      } else {
        spawnPopup(player.x, player.y - 30, 'Немає місця');
      }
      refreshCraftButtons();
    });
    el.appendChild(btn);

    list.appendChild(el);
  });
  refreshCraftButtons();
}

function refreshCraftButtons() {
  document.querySelectorAll('.craftBtn').forEach(btn => {
    const recipe = RECIPES[+btn.dataset.idx];
    if (!recipe) return;
    const needsOk = Object.entries(recipe.needs).every(([k, v]) => invCount(k) >= v);
    if ((recipe.station || 'hand') === 'workbench') {
      btn.disabled = !needsOk || !craftStation || getWorkbenchJobs(craftStation).length >= 4;
    } else {
      btn.disabled = !needsOk || !canAddItem(recipe.id, recipe.qty);
    }
  });
}

function setCraftOpen(open = !craftOpen, context = craftContext, station = craftStation) {
  craftOpen = open;
  document.getElementById('craftMenu').style.display = craftOpen ? 'block' : 'none';
  if (!craftOpen) {
    craftContext = 'hand';
    craftStation = null;
    return;
  }
  craftContext = context || 'hand';
  craftStation = craftContext === 'workbench' ? station : null;
  buildCraftUI();
}

// ═══════════════════════════════════════════════════════════
//  INPUT HANDLING
// ═══════════════════════════════════════════════════════════
window.addEventListener('keydown', e => {
  keys[e.code] = true;

  // Number keys → hotbar slot
  if (/^[0-9]$/.test(e.key)) {
    activeSlot = e.key === '0' ? 9 : (+e.key - 1);
    resetUseProgress();
    refreshHotbarUI();
    return;
  }

  switch (e.code) {
    case 'KeyC':   // toggle craft menu
      setCraftOpen(!craftOpen || craftContext !== 'hand', 'hand', null);
      break;

    case 'KeyF':   // place item
      doPlace();
      break;

    case 'KeyM':
      setLargeMapOpen();
      break;

    case 'KeyE': {
      const target = getInteractionPromptTarget();
      if (!target) break;
      if (target.kind === 'door') target.obj.open = !target.obj.open;
      if (target.kind === 'workbench') {
        ensurePlacedObjectState(target.obj);
        if (!collectWorkbenchOutput(target.obj)) setCraftOpen(true, 'workbench', target.obj);
      }
      break;
    }

  }
});

window.addEventListener('keyup', e => {
  keys[e.code] = false;
});

canvas.addEventListener('mousemove', e => {
  msx = e.clientX;
  msy = e.clientY;
  mwx = msx + cam.x;
  mwy = msy + cam.y;
});

canvas.addEventListener('mousedown', () => {
  const tool = activeTool();
  if (tool && ITEMS[tool]?.placeable) {
    doPlace();
  } else {
    mouseHeld = true;
    if (!(tool && isHoldUseItem(tool))) doAttack();
  }
});

window.addEventListener('mouseup', () => {
  mouseHeld = false;
  resetUseProgress();
});
window.addEventListener('blur', () => {
  mouseHeld = false;
  resetUseProgress();
});

minimapWrap?.addEventListener('click', () => setLargeMapOpen(true));
mapCloseBtn?.addEventListener('click', e => { e.stopPropagation(); setLargeMapOpen(false); });
document.getElementById('craftTrigger')?.addEventListener('click', e => {
  e.stopPropagation();
  setCraftOpen(!craftOpen || craftContext !== 'hand', 'hand', null);
});

// Hotbar slot clicks
document.querySelectorAll('.hotslot').forEach((el, i) => {
  el.addEventListener('click', e => {
    e.stopPropagation();   // prevent canvas click
    activeSlot = i;
    resetUseProgress();
    refreshHotbarUI();
  });
});

// Menu close buttons
document.getElementById('invClose').addEventListener('click', () => {
  invOpen = false;
  document.getElementById('inventory').style.display = 'none';
});
document.getElementById('craftClose').addEventListener('click', () => {
  setCraftOpen(false);
});

window.addEventListener('pointerdown', tryPlayWorldMusic, { once: true });
window.addEventListener('keydown', tryPlayWorldMusic, { once: true });

// ═══════════════════════════════════════════════════════════
//  BOOTSTRAP
// ═══════════════════════════════════════════════════════════
preloadAssets(() => {
  document.getElementById('loading').style.display = 'none';
  tryPlayWorldMusic();

  // Generate the world
  generateWorld();

  // Give player a small head-start kit
  invAdd('branch', 3);
  invAdd('stone', 2);
  refreshHotbarUI();
  refreshHudBars();

  const maxInitX = Math.max(0, WORLD_WIDTH - canvas.width);
  const maxInitY = Math.max(0, WORLD_HEIGHT - canvas.height);
  cam.x = clamp(player.x - canvas.width / 2, 0, maxInitX);
  cam.y = clamp(player.y - canvas.height / 2, 0, maxInitY);

  // Grass pattern is created lazily on first drawBackground() call

  // Kick off the game loop
  requestAnimationFrame(ts => { lastTs = ts; render(ts); });
});
</script>
